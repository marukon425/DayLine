  <circle cx="0" cy="0" r="383"  fill="none" stroke="rgb(1,29,69)" stroke-width="0.8" opacity="0.11"/>
  <circle cx="0" cy="0" r="203"  fill="none" stroke="rgb(1,29,69)" stroke-width="0.8" opacity="0.10"/>
  <circle cx="0" cy="0" r="90"   fill="none" stroke="rgb(1,29,69)" stroke-width="0.6" opacity="0.09"/>

  <!-- 放射線 -->
  <line x1="0" y1="0" x2="1440" y2="585"  stroke="rgb(1,29,69)" stroke-width="0.6" opacity="0.08"/>
  <line x1="0" y1="0" x2="1170" y2="900"  stroke="rgb(1,29,69)" stroke-width="0.6" opacity="0.08"/>
  <line x1="0" y1="0" x2="720"  y2="900"  stroke="rgb(1,29,69)" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="0" x2="1440" y2="320"  stroke="rgb(1,29,69)" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="0" x2="400"  y2="900"  stroke="rgb(1,29,69)" stroke-width="0.5" opacity="0.05"/>

