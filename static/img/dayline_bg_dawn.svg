<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="morn" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#ffe8c0"/>
      <stop offset="40%"  stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#f0f4ff"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="88%" r="40%" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1440" y2="900">
      <stop offset="0%"   stop-color="#f5a623" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#f5a623" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#morn)"/>
  <rect width="1440" height="900" fill="url(#sun)"/>

  <!-- 放射光線 -->
  <g stroke="#f5a623" stroke-width="0.8" opacity="0.18" stroke-linecap="round">
    <line x1="720" y1="792" x2="270"  y2="260"/>
    <line x1="720" y1="792" x2="450"  y2="180"/>
    <line x1="720" y1="792" x2="630"  y2="135"/>
    <line x1="720" y1="792" x2="810"  y2="135"/>
    <line x1="720" y1="792" x2="990"  y2="180"/>
    <line x1="720" y1="792" x2="1170" y2="260"/>
    <line x1="720" y1="792" x2="135"  y2="360"/>
    <line x1="720" y1="792" x2="1305" y2="360"/>
  </g>

  <!-- 地平線 -->
  <line x1="0" y1="783" x2="1440" y2="783" stroke="#f5a623" stroke-width="1" opacity="0.35"/>

  <!-- 太陽 -->
  <circle cx="720" cy="790" r="45"  fill="#f5a623" opacity="0.25"/>
  <circle cx="720" cy="790" r="22"  fill="#f5a623" opacity="0.6"/>
  <circle cx="720" cy="790" r="9"   fill="#f5a623" opacity="1"/>

  <!-- 時刻ライン -->
  <line x1="0" y1="135" x2="1440" y2="135" stroke="rgb(1,29,69)" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="360" x2="1440" y2="360" stroke="rgb(1,29,69)" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="585" x2="1440" y2="585" stroke="rgb(1,29,69)" stroke-width="0.5" opacity="0.04"/>
</svg>
