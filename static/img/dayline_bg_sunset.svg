      <stop offset="0%"   stop-color="#1a2a5e"/>
      <stop offset="40%"  stop-color="#c05020"/>
      <stop offset="70%"  stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#ffe0a0"/>
    </linearGradient>
    <radialGradient id="sA_sun" cx="50%" cy="72%" r="30%" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1440" y2="900">
      <stop offset="0%"   stop-color="#ffe566" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#f5a623" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
